<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>NTĐ Leaderboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#6dd5ed,#2193b0);
color:#333;
}

h1{
text-align:center;
color:white;
margin:20px;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:rgba(255,255,255,0.9);
padding:20px;
border-radius:16px;
margin-bottom:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

input{
padding:6px;
border-radius:8px;
border:1px solid #ccc;
width:60px;
}

button{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.saveBtn{background:#2ecc71;color:white;}
.editBtn{background:#f39c12;color:white;}
.delBtn{background:#e74c3c;color:white;}

.podium{
display:flex;
justify-content:center;
align-items:flex-end;
gap:20px;
margin-bottom:20px;
}

.podium div{
padding:15px;
border-radius:10px;
color:white;
font-weight:bold;
text-align:center;
}

.first{background:gold;height:140px;width:120px}
.second{background:silver;height:110px;width:110px}
.third{background:#cd7f32;height:90px;width:100px}

.player{
display:flex;
align-items:center;
background:#f6f6f6;
padding:10px;
border-radius:10px;
margin-bottom:8px;
}

.rank{width:40px}
.name{flex:1}
.icons{flex:2}
.score{width:80px;text-align:right}
.actions{width:100px;text-align:right}

#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.popupCard{
background:white;
padding:30px;
border-radius:16px;
font-size:20px;
}

</style>
</head>

<body>

<h1>🏆 NTĐ LEADERBOARD</h1>

<div class="container">

<div class="card">

Tên
<input id="name">

🌿<input id="leaf" type="number" value="0">
🌸<input id="flower" type="number" value="0">
🍇<input id="fruit" type="number" value="0">
🌳<input id="tree" type="number" value="0">

<button class="saveBtn" onclick="addPlayer()">Lưu</button>

</div>

<div id="podium" class="podium"></div>

<div class="card">
<div id="list"></div>
</div>

<div class="card">
<h3>Biểu đồ điểm</h3>
<canvas id="chart"></canvas>
</div>

</div>

<div id="popup">
<div class="popupCard">
<span id="popupText">Loading...</span>
</div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycby6UviLXwOXBUCGFlEhEZVSwK4W7h9zEaVG0o4D4yWIapDv3CF4nMp39KOseqI6jePg3w/exec"

let players=[]
let chart=null

function score(p){
return p.leaf + p.flower*50 + p.fruit*500 + p.tree*1000
}

function icons(p){
return "🌿".repeat(p.leaf)+
"🌸".repeat(p.flower)+
"🍇".repeat(p.fruit)+
"🌳".repeat(p.tree)
}

function popup(t){
document.getElementById("popup").style.display="flex"
document.getElementById("popupText").innerText=t
setTimeout(()=>document.getElementById("popup").style.display="none",2000)
}

async function load(){

try{

let r=await fetch(API)
let d=await r.json()

if(Array.isArray(d)){
players=d
render()
}

}catch(e){}

}

async function save(){

popup("Đang lưu...")

await fetch(API,{
method:"POST",
body:JSON.stringify(players)
})

setTimeout(load,2000)

}

function addPlayer(){

let name=nameInput.value.trim()

if(!name)return

let p=players.find(x=>x.name==name)

let data={
leaf:+leaf.value,
flower:+flower.value,
fruit:+fruit.value,
tree:+tree.value
}

if(p){

p.leaf+=data.leaf
p.flower+=data.flower
p.fruit+=data.fruit
p.tree+=data.tree

}else{

players.push({name,...data})

}

players.forEach(x=>x.score=score(x))

render()
save()

}

function render(){

players.sort((a,b)=>b.score-a.score)

drawPodium()
drawList()
drawChart()

}

function drawPodium(){

let p=document.getElementById("podium")

p.innerHTML=""

if(players[1])p.innerHTML+=`<div class="second">🥈<br>${players[1].name}</div>`
if(players[0])p.innerHTML+=`<div class="first">👑<br>${players[0].name}</div>`
if(players[2])p.innerHTML+=`<div class="third">🥉<br>${players[2].name}</div>`

}

function drawList(){

let html=""

players.forEach((p,i)=>{

html+=`

<div class="player">

<div class="rank">#${i+1}</div>

<div class="name">${p.name}</div>

<div class="icons">${icons(p)}</div>

<div class="score">${p.score}</div>

<div class="actions">

<button class="editBtn">✏️</button>
<button class="delBtn">❌</button>

</div>

</div>

`

})

list.innerHTML=html

}

function drawChart(){

let ctx=document.getElementById("chart")

let labels=players.map(p=>p.name)
let scores=players.map(p=>p.score)

if(chart)chart.destroy()

chart=new Chart(ctx,{
type:"bar",
data:{
labels:labels,
datasets:[{label:"Điểm",data:scores}]
}
})

}

load()

setInterval(load,5000)

</script>

</body>
</html>
