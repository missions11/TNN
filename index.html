<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bảng Xếp Hạng NTĐ</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#a8edea,#fed6e3);
}

h1{
text-align:center;
font-size:40px;
color:#ff2e63;
margin:20px;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
margin-bottom:20px;
}

/* form */

input{
width:60px;
padding:6px;
border-radius:8px;
border:1px solid #ddd;
}

button{
padding:8px 12px;
border-radius:10px;
border:none;
cursor:pointer;
font-weight:bold;
}

.addBtn{background:#2ecc71;color:white;}
.editBtn{background:#f39c12;color:white;}
.deleteBtn{background:#e74c3c;color:white;}

/* list */

.player{
display:flex;
align-items:center;
padding:12px;
margin-bottom:10px;
border-radius:12px;
background:#f7f7f7;
}

.rank{width:40px;font-weight:bold}
.name{flex:1}
.icons{flex:2}
.score{width:80px;text-align:right;font-weight:bold}
.actions{width:120px;text-align:right}

/* podium */

.podium{
display:flex;
justify-content:center;
align-items:flex-end;
gap:20px;
margin-bottom:20px;
}

.podium div{
text-align:center;
padding:10px;
border-radius:15px;
color:white;
font-weight:bold;
}

.first{background:gold;height:140px;width:120px;}
.second{background:silver;height:110px;width:110px;}
.third{background:#cd7f32;height:90px;width:100px;}

canvas{max-height:350px}

/* POPUP LOADING FIX */

#notifyBox{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;

width:100vw;
height:100vh;

background:rgba(0,0,0,0.6);

display:none;
align-items:center;
justify-content:center;

z-index:9999;
}

.popup{

background:white;

padding:30px 40px;

border-radius:20px;

text-align:center;

font-size:20px;

box-shadow:0 10px 40px rgba(0,0,0,0.4);

animation:popupFade .25s ease;

}

/* EDIT MODAL */

.modal{

position:fixed;
top:0;
left:0;
right:0;
bottom:0;

width:100vw;
height:100vh;

background:rgba(0,0,0,0.55);

display:none;
align-items:center;
justify-content:center;

z-index:10000;

}

.modalBox{

background:white;

padding:30px;

border-radius:20px;

width:420px;
max-width:90%;

box-shadow:0 15px 40px rgba(0,0,0,0.35);

animation:popupFade .25s ease;

}

.formRow{
margin:10px 0;
display:flex;
gap:10px;
align-items:center;
}

@keyframes popupFade{

from{
transform:scale(.85);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}

</style>
</head>

<body>

<h1>🏆 BẢNG XẾP HẠNG NTĐ</h1>

<div class="container">

<div class="card">

Tên
<input id="name">

🌿 <input type="number" id="leaf" value="0">
🌸 <input type="number" id="flower" value="0">
🍇 <input type="number" id="fruit" value="0">
🌳 <input type="number" id="tree" value="0">
📖 <input type="number" id="book" value="0">
🗺️ <input type="number" id="map" value="0">

<button class="addBtn" onclick="addPlayer()">💾 Lưu</button>

</div>

<div class="podium" id="podium"></div>

<div class="card">
<div id="list"></div>
</div>

<div class="card">
<h3>📊 Biểu đồ điểm</h3>
<canvas id="scoreChart"></canvas>
</div>

</div>

<!-- loading popup -->

<div id="notifyBox">
<div class="popup">
<div id="notifyText">Đang xử lý...</div>
<div style="font-size:40px">
⏳ <span id="countdown">10</span>
</div>
</div>
</div>

<!-- edit popup -->

<div id="editModal" class="modal">
<div class="modalBox">

<h2>✏️ Chỉnh sửa người chơi</h2>

<div class="formRow">
Tên
<input id="editName" disabled>
</div>

<div class="formRow">
🌿 <input type="number" id="editLeaf">
🌸 <input type="number" id="editFlower">
🍇 <input type="number" id="editFruit">
🌳 <input type="number" id="editTree">
📖 <input type="number" id="editBook">
🗺️ <input type="number" id="editMap">
</div>

<div style="margin-top:20px">

<button onclick="saveEdit()" class="addBtn">💾 Lưu</button>

<button onclick="closeEdit()" class="deleteBtn">❌ Huỷ</button>

</div>

</div>
</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycby6UviLXwOXBUCGFlEhEZVSwK4W7h9zEaVG0o4D4yWIapDv3CF4nMp39KOseqI6jePg3w/exec"

let players=[]
let scoreChart=null
let editIndex=null

const listEl=document.getElementById("list")

function calcScore(p){
return p.leaf*1+p.flower*50+p.fruit*500+p.tree*1000+p.book*20+p.map*5
}

function icons(p){
return "🌿".repeat(p.leaf)+"🌸".repeat(p.flower)+"🍇".repeat(p.fruit)+"🌳".repeat(p.tree)+"📖".repeat(p.book)+"🗺️".repeat(p.map)
}

function findPlayer(name){
return players.find(p=>p.name.toLowerCase()==name.toLowerCase())
}

function showNotify(text){

let box=document.getElementById("notifyBox")
let t=document.getElementById("notifyText")
let cd=document.getElementById("countdown")

box.style.display="flex"

t.innerText=text

let time=10
cd.innerText=time

let timer=setInterval(()=>{

time--
cd.innerText=time

if(time<=0){
clearInterval(timer)
box.style.display="none"
}

},1000)

}

async function loadDrive(){

try{

let res=await fetch(API_URL)
let data=await res.json()

if(Array.isArray(data)){

players=data

players.forEach(p=>p.score=calcScore(p))

render()

}

}catch(e){

let backup=localStorage.getItem("leaderboardBackup")

if(backup){

players=JSON.parse(backup)

render()

}

}

}

async function saveDrive(){

showNotify("Đang lưu dữ liệu lên Drive...")

localStorage.setItem("leaderboardBackup",JSON.stringify(players))

await fetch(API_URL,{
method:"POST",
body:JSON.stringify(players)
})

setTimeout(loadDrive,3000)

}

function addPlayer(){

let name=nameInput.value.trim()

if(!name) return

let data={
leaf:+leaf.value,
flower:+flower.value,
fruit:+fruit.value,
tree:+tree.value,
book:+book.value,
map:+map.value
}

let p=findPlayer(name)

if(p){

p.leaf+=data.leaf
p.flower+=data.flower
p.fruit+=data.fruit
p.tree+=data.tree
p.book+=data.book
p.map+=data.map

}else{

p={name,...data}
players.push(p)

}

p.score=calcScore(p)

render()
saveDrive()

}

function editPlayer(i){

let p=players[i]

editIndex=i

editName.value=p.name
editLeaf.value=p.leaf
editFlower.value=p.flower
editFruit.value=p.fruit
editTree.value=p.tree
editBook.value=p.book
editMap.value=p.map

editModal.style.display="flex"

}

function closeEdit(){
editModal.style.display="none"
}

function saveEdit(){

let p=players[editIndex]

p.leaf=+editLeaf.value
p.flower=+editFlower.value
p.fruit=+editFruit.value
p.tree=+editTree.value
p.book=+editBook.value
p.map=+editMap.value

p.score=calcScore(p)

closeEdit()

render()
saveDrive()

}

function deletePlayer(i){

let pass=prompt("Password xoá")

if(pass!="111111") return

players.splice(i,1)

render()
saveDrive()

}

function render(){

players.sort((a,b)=>b.score-a.score)

drawPodium()
drawList()
drawChart()

}

function drawPodium(){

let p=document.getElementById("podium")

p.innerHTML=""

if(players[1]) p.innerHTML+=`<div class="second">🥈<br>${players[1].name}</div>`
if(players[0]) p.innerHTML+=`<div class="first">👑<br>${players[0].name}</div>`
if(players[2]) p.innerHTML+=`<div class="third">🥉<br>${players[2].name}</div>`

}

function drawList(){

let html=""

players.forEach((p,i)=>{

html+=`

<div class="player">

<div class="rank">#${i+1}</div>

<div class="name">${p.name}</div>

<div class="icons">${icons(p)}</div>

<div class="score">${p.score}</div>

<div class="actions">

<button class="editBtn" onclick="editPlayer(${i})">✏️</button>
<button class="deleteBtn" onclick="deletePlayer(${i})">❌</button>

</div>

</div>

`

})

listEl.innerHTML=html

}

function drawChart(){

let ctx=document.getElementById("scoreChart")

let labels=players.map(p=>p.name)
let scores=players.map(p=>p.score)

if(scoreChart) scoreChart.destroy()

scoreChart=new Chart(ctx,{

type:'bar',

data:{
labels:labels,
datasets:[{
label:'Điểm',
data:scores
}]
},

options:{
responsive:true,
plugins:{legend:{display:false}}
}

})

}

showNotify("Đang tải dữ liệu...")

loadDrive()

setInterval(loadDrive,5000)

</script>

</body>
</html>
