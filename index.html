<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<title>BẢNG XẾP HẠNG</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#a8edea,#fed6e3);
}

h1{
text-align:center;
padding:20px;
color:#ff2e63;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:white;
border-radius:20px;
padding:15px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

input{
width:60px;
padding:6px;
margin:5px;
border-radius:8px;
border:1px solid #ddd;
}

button{
padding:8px 12px;
border-radius:8px;
border:none;
margin:3px;
cursor:pointer;
}

.addBtn{background:#4CAF50;color:white;}
.editBtn{background:orange;}
.deleteBtn{background:red;color:white;}

.player{
display:flex;
align-items:center;
padding:10px;
border-radius:12px;
margin-bottom:8px;
background:#f9f9f9;
}

.rank{width:40px;font-weight:bold;}
.name{flex:1;}
.icons{flex:2;}
.score{width:80px;text-align:right;}
.actions{width:110px;text-align:right;}

.top1{background:linear-gradient(45deg,gold,orange)}
.top2{background:linear-gradient(45deg,silver,#ddd)}
.top3{background:linear-gradient(45deg,#cd7f32,#e0a96d)}

</style>
</head>

<body>

<h1>🏆 BẢNG XẾP HẠNG</h1>

<div class="container">

<div class="card">

Tên
<input id="name">

🌿 <input type="number" id="leaf" value="0">
🌸 <input type="number" id="flower" value="0">
🍇 <input type="number" id="fruit" value="0">
🌳 <input type="number" id="tree" value="0">
📖 <input type="number" id="book" value="0">
🗺️ <input type="number" id="map" value="0">

<br><br>

<button class="addBtn" onclick="addPlayer()">➕ Thêm</button>
<button onclick="saveDrive()">💾 Lưu</button>
<button onclick="backup()">📥 Backup JSON</button>

<div id="status"></div>

</div>

<div id="list"></div>

</div>

<script>

const PASSWORD="111111"

const API_URL="https://script.google.com/macros/s/AKfycby6UviLXwOXBUCGFlEhEZVSwK4W7h9zEaVG0o4D4yWIapDv3CF4nMp39KOseqI6jePg3w/exec"

let players=[]

function loadLocal(){

try{
players=JSON.parse(localStorage.getItem("players")||"[]")
}catch{
players=[]
}

}

function saveLocal(){
localStorage.setItem("players",JSON.stringify(players))
}

function calcScore(p){
return p.leaf*1+p.flower*50+p.fruit*500+p.tree*1000+p.book*20+p.map*5
}

function icons(p){

return "🌿".repeat(p.leaf)
+"🌸".repeat(p.flower)
+"🍇".repeat(p.fruit)
+"🌳".repeat(p.tree)
+"📖".repeat(p.book)
+"🗺️".repeat(p.map)

}

function findPlayer(name){
return players.find(p=>p.name.toLowerCase()==name.toLowerCase())
}

function addPlayer(){

let name=document.getElementById("name").value.trim()

if(!name){
alert("Nhập tên")
return
}

let data={
leaf:+leaf.value||0,
flower:+flower.value||0,
fruit:+fruit.value||0,
tree:+tree.value||0,
book:+book.value||0,
map:+map.value||0
}

let p=findPlayer(name)

if(p){

p.leaf+=data.leaf
p.flower+=data.flower
p.fruit+=data.fruit
p.tree+=data.tree
p.book+=data.book
p.map+=data.map

}else{

p={name,...data}
players.push(p)

}

p.score=calcScore(p)

saveLocal()
render()

}

function editPlayer(i){

let p=players[i]

p.leaf=+prompt("🌿",p.leaf)
p.flower=+prompt("🌸",p.flower)
p.fruit=+prompt("🍇",p.fruit)
p.tree=+prompt("🌳",p.tree)
p.book=+prompt("📖",p.book)
p.map=+prompt("🗺️",p.map)

p.score=calcScore(p)

saveLocal()
render()

}

function deletePlayer(i){

let pass=prompt("Nhập mật khẩu xoá")

if(pass!==PASSWORD){
alert("Sai mật khẩu")
return
}

players.splice(i,1)

saveLocal()
render()

}

function render(){

players.forEach(p=>p.score=calcScore(p))

players.sort((a,b)=>b.score-a.score)

let html=""

players.forEach((p,i)=>{

let cls=i==0?"top1":i==1?"top2":i==2?"top3":""

html+=`
<div class="player ${cls}">
<div class="rank">#${i+1}</div>
<div class="name">${p.name}</div>
<div class="icons">${icons(p)}</div>
<div class="score">${p.score}</div>
<div class="actions">
<button class="editBtn" onclick="editPlayer(${i})">✏️</button>
<button class="deleteBtn" onclick="deletePlayer(${i})">❌</button>
</div>
</div>
`

})

list.innerHTML=html

}

async function saveDrive(){

const status=document.getElementById("status")

status.innerHTML="⏳ Đang lưu..."

try{

await fetch(API_URL,{
method:"POST",
body:JSON.stringify(players)
})

status.innerHTML="✅ Đã lưu Google Drive"

await loadDrive()

}catch{

status.innerHTML="❌ Lỗi lưu"

}

}

async function loadDrive(){

try{

let r=await fetch(API_URL)

let data=await r.json()

if(Array.isArray(data)){

players=data

saveLocal()

render()

}

}catch{}

}

function backup(){

let blob=new Blob(
[JSON.stringify(players,null,2)],
{type:"application/json"}
)

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="ranking-backup.json"

a.click()

}

setInterval(loadDrive,10000)

loadLocal()
render()
loadDrive()

</script>

</body>
</html>
